spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/appdb}
    username: ${DB_USER:appuser}
    password: ${DB_PASSWORD:apppassword}
  jooq:
    sql-dialect: POSTGRES
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-must-be-at-least-32-chars}
    access-token-expiry: 900        # 15 min in seconds
    refresh-token-expiry: 2592000   # 30 days in seconds

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/appdb
    username: appuser
    password: apppassword

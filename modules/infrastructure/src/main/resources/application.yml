spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/appdb}
    username: ${DB_USER:appuser}
    password: ${DB_PASSWORD:apppassword}
  jooq:
    sql-dialect: POSTGRES
  flyway:
    enabled: true
    locations: classpath:db/migration
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false

server:
  port: 8080

app:
  security:
    jwt:
      secret: ${JWT_SECRET:change-me-in-production-must-be-at-least-32-chars-long}
      access-token-expiry: 900       # 15 min in seconds
      refresh-token-expiry: 604800   # 7 days in seconds
  admin:
    email: ${ADMIN_EMAIL:admin@example.com}
    seed-password: ${ADMIN_SEED_PASSWORD:Admin@123}
  email:
    from: ${EMAIL_FROM:noreply@example.com}
  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:3000}

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/appdb
    username: appuser
    password: apppassword
